services:
  app:
    build: .
    container_name: drges_app
    ports:
      - "8000:80"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html/public
    volumes:
      - .:/var/www/html

  db:
    image: mysql:8.0
    container_name: drges_db
    restart: always
    environment:
      MYSQL_DATABASE: drges_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: drges_user
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: drges_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data: